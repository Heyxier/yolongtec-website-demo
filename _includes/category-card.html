<a href="{{ include.category.slug }}/index.html" class="category-card">
    <div class="category-image">
        <img src="{{ include.category.image }}" alt="{{ include.category.name }}">
        <div class="category-overlay">
            <span class="category-count">{{ include.category.count }} Models</span>
        </div>
    </div>
    <div class="category-info">
        <h3 class="category-name">{{ include.category.name }}</h3>
        <p class="category-desc">{{ include.category.desc }}</p>
        <span class="category-link">EXPLORE →</span>
    </div>
</a>
