name: Build and Deploy Yolongtec to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'

      - run: gem install jekyll jekyll-feed jekyll-seo-tag jekyll-sitemap --no-document

      - run: jekyll build

      - run: |
          mkdir -p _site/admin
          cp admin/index.html _site/admin/

      - uses: actions/upload-pages-artifact@v1
        with:
          path: ./_site

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/deploy-pages@v2