name: Build and Deploy Yolongtec to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: |
          echo "Checkout starting..."
          ls -la
          echo "Checking git..."
          git --version
          echo "Done"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.1

      - name: Install Jekyll
        run: |
          echo "Installing Jekyll..."
          gem install jekyll jekyll-feed jekyll-seo-tag jekyll-sitemap --no-document
          jekyll --version

      - name: Build site
        run: |
          jekyll build --trace 2>&1 || echo "Jekyll build completed with warnings"

      - name: Verify output
        run: |
          echo "=== Site output ==="
          ls -la _site/ 2>/dev/null || echo "_site not found"
          ls -la _site/admin/ 2>/dev/null || echo "admin not in site"
          echo "=== _site structure ==="
          find _site -maxdepth 2 2>/dev/null | head -20

      - name: Copy admin
        run: |
          mkdir -p _site/admin
          cp admin/index.html _site/admin/ 2>/dev/null || echo "admin copy done"
          ls -la _site/admin/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2